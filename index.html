<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Flappy Bird — Neon Sky</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="wrapper">
        <canvas id="gameCanvas"></canvas>
        <canvas id="particleCanvas"></canvas>

        <div id="flashOverlay"></div>

        <div id="pauseOverlay">
            <h2>PAUSED</h2>
        </div>

        <button id="pauseBtn" aria-label="Pause">⏸</button>

        <div class="screen visible" id="startScreen">
            <span class="screen-bird">🐦</span>
            <h1>Flappy Bird</h1>
            <p style="color:rgba(255,255,255,0.7); font-size:0.95rem; margin-bottom:16px;">
                Neon Sky Edition
            </p>
            <div class="hint-row">
                <span class="hint-pill">⌨️ Space</span>
                <span class="hint-pill">👆 Tap</span>
                <span class="hint-pill">鼠标 Click</span>
            </div>
            <button class="btn btn-primary" id="startBtn" style="margin-top:22px">▶ Start Game</button>
            <p style="margin-top:14px; font-size:0.75rem; color:rgba(255,255,255,0.3);">
                Press P to pause · Difficulty increases over time
            </p>
        </div>

        <div class="screen" id="gameOverScreen">
            <span class="screen-bird" style="animation: none; font-size:2.8rem">💥</span>
            <h2>Game Over</h2>
            <div class="score-row">
                <div class="score-item">
                    <label>Score</label>
                    <span id="finalScore">0</span>
                </div>
                <div class="score-item">
                    <label>Best</label>
                    <span class="best" id="bestScore">0</span>
                </div>
            </div>
            <div id="medalDisplay" style="margin-bottom:8px"></div>
            <div id="difficultyReached" class="diff-badge diff-easy">Easy</div>
            <button class="btn btn-primary" id="restartBtn" style="margin-top:18px">↩ Play Again</button>
            <button class="btn btn-secondary" id="menuBtn">⌂ Main Menu</button>
        </div>
    </div>

    <script src="script.js" defer></script>
</body>
</html>
